  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --crimson: #8B0000;
      --rose: #C2185B;
      --blush: #FF8A80;
      --gold: #FFD700;
      --cream: #FFF8F0;

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      color: var(--cream);
      background: radial-gradient(ellipse at 50% 30%, #4a0018 0%, var(--crimson) 35%, #1a0008 100%);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 50%, transparent 50%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 50%, transparent 50%),
        radial-gradient(1.5px 1.5px at 70% 15%, rgba(255,215,0,0.5) 50%, transparent 50%),
        radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.35) 50%, transparent 50%),
        radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.3) 50%, transparent 50%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.25) 50%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 4s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    #petal-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
    }

    .scene {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem 1.5rem 5rem;
    }

    .title-520 {
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--gold), #fff5cc, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
    }

    .subtitle {
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      opacity: 0.85;
      margin-bottom: 2rem;
      letter-spacing: 0.3em;
    }

    .bouquet-wrap {
      position: relative;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      padding: 1rem;
      margin: 0.5rem 0 2rem;
      transition: filter 0.5s ease;
    }

    .bouquet-wrap.bloom {
      animation: bouquetBloom 1.2s ease-out forwards;
    }

    @keyframes bouquetBloom {
      0% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(194, 24, 91, 0.4)); }
      40% { transform: scale(1.12); filter: drop-shadow(0 0 60px rgba(255, 215, 0, 0.7)); }
      100% { transform: scale(1.05); filter: drop-shadow(0 0 45px rgba(255, 138, 128, 0.6)); }
    }

    .bouquet {
      width: clamp(220px, 55vw, 320px);
      height: auto;
      animation: breathe 3.5s ease-in-out infinite;
      transform-origin: center bottom;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1) rotate(-0.5deg); }
      50% { transform: scale(1.03) rotate(0.5deg); }
    }

    .hint {
      font-size: clamp(0.85rem, 3vw, 1rem);
      opacity: 0.75;
      animation: hintPulse 2s ease-in-out infinite;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;

    @keyframes hintPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.95; }
    }

    /* love card overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      pointer-events: none;

    .overlay.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;

    .love-card {
      position: relative;
      max-width: 420px;
      width: 100%;

      transform: translateY(30px) scale(0.95);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.visible .love-card {
      transform: translateY(0) scale(1);
    }

    .card-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: var(--cream);
      font-size: 1.4rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;

    .card-title {

    .overlay.visible .card-body p:nth-child(1) { animation-delay: 0.2s; }
    .overlay.visible .card-body p:nth-child(2) { animation-delay: 0.5s; }
    .overlay.visible .card-body p:nth-child(3) { animation-delay: 0.8s; }

    @keyframes lineIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.7;
      letter-spacing: 0.2em;
      opacity: 0;

    .overlay.visible .card-footer {

    /* music toggle */
    .music-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 248, 240, 0.25);
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      color: var(--cream);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }

    .music-btn:hover { background: rgba(194, 24, 91, 0.5); }
    .music-btn.playing { border-color: var(--gold); }

    /* reduced motion */
    .seo-footer {
      position: fixed;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      opacity: 0.35;
      z-index: 4;
      pointer-events: none;
      letter-spacing: 0.05em;
    }

    @media (prefers-reduced-motion: reduce) {
      .bouquet, .hint, body::before { animation: none !important; }
      .bouquet-wrap.bloom { animation: none !important; }
      .overlay.visible .card-body p,
      .overlay.visible .card-footer { animation: none !important; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

      <h2 class="card-title" id="card-title">520 · 我爱你</h2>
      <div class="card-body">
        <p>五月的微风里，每一瓣玫瑰都在说爱你。</p>

  <script>
    (function () {
      const CONFIG = {
        longPressMs: 600,
        rainDurationMs: 10000,
        particleCount: 50,
      };

      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const bouquetWrap = document.getElementById('bouquet-wrap');
      const overlay = document.getElementById('overlay');
      const cardClose = document.getElementById('card-close');
      const hint = document.getElementById('hint');
      const canvas = document.getElementById('petal-canvas');
      const ctx = canvas.getContext('2d');
      const musicBtn = document.getElementById('music-btn');
      const bgm = document.getElementById('bgm');

      let revealed = false;
      let rainActive = false;
      let rainTimer = null;
      let animId = null;
      let particles = [];
      let musicEnabled = false;
      let musicPlaying = false;

      // --- canvas setup ---
      function resizeCanvas() {
        canvas.width = window.innerWidth * devicePixelRatio;
        canvas.height = window.innerHeight * devicePixelRatio;
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // --- petal particle ---
      const petalColors = ['#e91e63', '#f06292', '#ec407a', '#ff8a80', '#ffcdd2', '#ce93d8'];

      function createParticle() {
        const w = window.innerWidth;
        return {
          x: Math.random() * w,
          y: -20 - Math.random() * 40,
          w: 8 + Math.random() * 10,
          h: 10 + Math.random() * 12,
          vx: (Math.random() - 0.5) * 1.2,
          vy: 1 + Math.random() * 2.5,
          rot: Math.random() * Math.PI * 2,
          vrot: (Math.random() - 0.5) * 0.06,
          opacity: 0.5 + Math.random() * 0.5,
          color: petalColors[Math.floor(Math.random() * petalColors.length)],
        };
      }

      function initParticles() {
        particles = [];
        for (let i = 0; i < CONFIG.particleCount; i++) {
          const p = createParticle();
          p.y = Math.random() * window.innerHeight;
          particles.push(p);
        }
      }

      function drawPetal(p) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.moveTo(0, -p.h * 0.5);
        ctx.bezierCurveTo(p.w * 0.6, -p.h * 0.3, p.w * 0.5, p.h * 0.4, 0, p.h * 0.5);
        ctx.bezierCurveTo(-p.w * 0.5, p.h * 0.4, -p.w * 0.6, -p.h * 0.3, 0, -p.h * 0.5);
        ctx.fill();
        ctx.restore();
      }

      function updateParticles() {
        const h = window.innerHeight;
        const w = window.innerWidth;
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vrot;
          p.vx += (Math.random() - 0.5) * 0.02;
          if (p.y > h + 30 || p.x < -30 || p.x > w + 30) {
            Object.assign(p, createParticle());
          }
        }
      }

      function loop() {
        if (!rainActive) return;
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        updateParticles();
        for (const p of particles) drawPetal(p);
        animId = requestAnimationFrame(loop);
      }

      function startRain() {
        if (reducedMotion) return;
        rainActive = true;
        initParticles();
        if (animId) cancelAnimationFrame(animId);
        loop();
        clearTimeout(rainTimer);
        rainTimer = setTimeout(stopRain, CONFIG.rainDurationMs);
      }

      function stopRain() {
        rainActive = false;
        if (animId) {
          cancelAnimationFrame(animId);
          animId = null;
        }
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      // --- reveal / hide ---
      function reveal(isLongPress) {
        if (revealed) return;
        revealed = true;
        overlay.classList.add('visible');
        hint.textContent = '玫瑰已为你绽放';
        if (isLongPress) {
          bouquetWrap.classList.add('bloom');
        }
        startRain();
        tryPlayMusic();
      }

      function hide() {
        revealed = false;
        overlay.classList.remove('visible');
        bouquetWrap.classList.remove('bloom');
        hint.textContent = '点击或长按，收下这束玫瑰';
        stopRain();
        // reset card lines for re-open
        document.querySelectorAll('.card-body p, .card-footer').forEach(el => {
          el.style.animation = 'none';
          void el.offsetWidth;
          el.style.animation = '';
        });
      }

      // --- music ---
      async function tryPlayMusic() {
        if (!musicEnabled || musicPlaying) return;
        try {
          await bgm.play();
          musicPlaying = true;
          musicBtn.classList.add('playing');
          musicBtn.textContent = '♫';
        } catch (_) {
          /* no audio file or autoplay blocked */
        }
      }

      musicBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        musicEnabled = !musicEnabled;
        if (musicEnabled) {
          musicBtn.classList.add('playing');
          await tryPlayMusic();
        } else {
          bgm.pause();
          musicPlaying = false;
          musicBtn.classList.remove('playing');
          musicBtn.textContent = '♪';
        }
      });

      // --- pointer: click vs long press ---
      let pressTimer = null;
      let longPressed = false;

      function onPointerDown(e) {
        if (revealed) return;
        longPressed = false;
        pressTimer = setTimeout(() => {
          longPressed = true;
          reveal(true);
        }, CONFIG.longPressMs);
      }

      function onPointerUp(e) {
        clearTimeout(pressTimer);
        if (!revealed && !longPressed) {
          reveal(false);
        }
      }

      function onPointerCancel() {
        clearTimeout(pressTimer);
      }

      bouquetWrap.addEventListener('pointerdown', onPointerDown);
      bouquetWrap.addEventListener('pointerup', onPointerUp);
      bouquetWrap.addEventListener('pointerleave', onPointerCancel);
      bouquetWrap.addEventListener('pointercancel', onPointerCancel);

      bouquetWrap.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          reveal(false);
        }
      });

      // close: button or overlay backdrop
      cardClose.addEventListener('click', (e) => {
        e.stopPropagation();
        hide();
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) hide();
      });

      // prevent card click from closing
      document.querySelector('.love-card').addEventListener('click', (e) => e.stopPropagation());
    })();
  </script>
